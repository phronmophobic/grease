name: membrane

on:
  workflow_dispatch:

jobs:

  mac:
    runs-on: macos-14
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Download Dependencies
        run: |
          scripts/download-deps

      - name: Setup
        run: |
          brew install autoconf
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          brew install cmake node cmocka
          cargo install wasm-bindgen-cli wasm-opt cargo-deny
          rustup toolchain install nightly
          rustup component add rust-src --toolchain nightly
          rustup target add aarch64-apple-ios
          cargo install cross --git https://github.com/cross-rs/cross
          scripts/setup

      - name: Setup Clojure
        # You may pin to the exact commit or the version.
        # uses: DeLaGuardo/setup-clojure@5042876523f30f5efcf1d6feaa48bd1498d7814f
        uses: DeLaGuardo/setup-clojure@13
        with:
          # Clojure CLI version to make available on the path.
          cli: 1.12.4.1618

      - name: Install dependencies
        run: clojure -P

      - name: Build macOS native image
        run: |
          /bin/bash scripts/compile-membrane

      - name: Build app
        run: |
          /bin/bash scripts/build-membrane

